<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرداخت</title>

<style>

body{
background:white;
font-family:tahoma;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.box{
background:#f5f5f5;
padding:25px;
border-radius:12px;
margin-top:20px;
}

h1{
color:black;
}

#courseName{
margin-bottom:10px;
}

#coursePrice{
color:#222;
margin-bottom:20px;
}

.card-number{
font-size:22px;
font-weight:bold;
margin:20px 0;
}

button{
background:black;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:.9;
}

.success{
margin-top:20px;
background:#eeeeee;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>
پرداخت دوره
</h1>

<div class="box">

<h2 id="courseName">
دوره
</h2>

<h3 id="coursePrice">
قیمت
</h3>

<hr>

<p>
شماره کارت:
</p>

<div class="card-number">
6037997194784360
</div>

<p>
به نام ماهان امیدی
</p>

<button onclick="copyCard()">
کپی شماره کارت
</button>

<button onclick="paid()">
پرداخت کردم
</button>

<div id="message"></div>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const course =
params.get("course");

const price =
params.get("price");

if(course){
document.getElementById("courseName")
.innerText = course;
}

if(price){
document.getElementById("coursePrice")
.innerText = price + " تومان";
}

function copyCard(){

navigator.clipboard.writeText(
"6037997194784360"
);

alert("شماره کارت کپی شد");

}

function paid(){

document.getElementById("message")
.innerHTML = `

<div class="success">

کاربر گرامی اگر پرداخت شما صحت داشته باشد
به زودی پشتیبانی برای شما آموزش را ارسال خواهد کرد.

<br><br>

روبیکا:
@Omidi__xx

<br>

شماره تماس:
09379405557

</div>

`;

}

</script>

</body>

    </html>
