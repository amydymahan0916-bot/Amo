<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرداخت دوره</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#f5f7fb;
}

.header{
background:#000;
color:#fff;
padding:25px;
text-align:center;
}

.container{
max-width:700px;
margin:30px auto;
padding:15px;
}

.card{
background:#fff;
border-radius:25px;
padding:25px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.course-title{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:15px;
}

.price-box{
background:#f1f5f9;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.price-box h2{
color:#000;
}

.card-box{
background:#000;
color:#fff;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.card-number{
font-size:24px;
font-weight:bold;
margin:15px 0;
word-break:break-all;
}

.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
border:none;
padding:15px;
border-radius:15px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.copy-btn{
background:#111827;
color:white;
}

.done-btn{
background:#16a34a;
color:white;
}

.message{
margin-top:20px;
background:#dcfce7;
padding:20px;
border-radius:15px;
display:none;
}

.contact-box{
margin-top:20px;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.contact-box h3{
margin-bottom:10px;
}

.footer{
margin-top:40px;
background:#000;
color:#fff;
text-align:center;
padding:20px;
}

@media(max-width:600px){

.btns{
grid-template-columns:1fr;
}

.card-number{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>
خدمات آموزشات ماهان امیدی
</h1>

</div>

<div class="container">

<div class="card">

<div class="course-title" id="courseName">
نام دوره
</div>

<div class="price-box">

<h2 id="coursePrice">
قیمت دوره
</h2>

</div>

<div class="card-box">

<h3>
شماره کارت
</h3>

<div class="card-number">
6037997194784360
</div>

<p>
به نام ماهان امیدی
</p>

</div>

<div class="btns">

<button class="copy-btn" onclick="copyCard()">
کپی شماره کارت
</button>

<button class="done-btn" onclick="paid()">
پرداخت کردم
</button>

</div>

<div class="message" id="msg">

<h3>
پرداخت ثبت شد
</h3>

<br>

کاربر گرامی اگر پرداخت شما صحت داشته باشد
به زودی پشتیبانی برای شما آموزش را ارسال خواهد کرد.

</div>

</div>

<div class="contact-box">

<h3>
پشتیبانی
</h3>

<p>
روبیکا:
@Omidi__xx
</p>

<br>

<p>
شماره تماس:
09379405557
</p>

</div>

</div>

<div class="footer">

© خدمات آموزشات ماهان امیدی

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const course =
params.get("course");

const price =
params.get("price");

if(course){
document.getElementById("courseName").innerText =
course;
}

if(price){
document.getElementById("coursePrice").innerText =
price + " تومان";
}

function copyCard(){

navigator.clipboard.writeText(
"6037997194784360"
);

alert("شماره کارت کپی شد");

}

function paid(){

document.getElementById("msg").style.display =
"block";

}

</script>

</body>

</html>
