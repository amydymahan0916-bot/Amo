<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت سفارش</title>

<link rel="stylesheet" href="style.css">

<style>

.payment-container{
max-width:700px;
margin:40px auto;
padding:20px;
}

.payment-card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.payment-title{
font-size:28px;
margin-bottom:20px;
color:#60a5fa;
}

.course-box{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.price{
font-size:24px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

.bank-card{
background:#0f172a;
border:1px solid #2563eb;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.card-number{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
color:white;
margin-bottom:10px;
}

.owner{
color:#cbd5e1;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:bold;
margin-top:10px;
}

.copy-btn{
background:#2563eb;
color:white;
}

.pay-btn{
background:#22c55e;
color:white;
}

.back-btn{
background:#374151;
color:white;
text-decoration:none;
display:block;
text-align:center;
padding:14px;
border-radius:12px;
margin-top:15px;
}

.message{
display:none;
margin-top:20px;
padding:15px;
background:rgba(34,197,94,.15);
border:1px solid #22c55e;
border-radius:12px;
color:#22c55e;
}

</style>

</head>

<body>

<div class="payment-container">

<div class="payment-card">

<h1 class="payment-title">
ثبت سفارش آموزش
</h1>

<div class="course-box">

<h2 id="courseName">
نام آموزش
</h2>

<div class="price" id="coursePrice">
0 تومان
</div>

</div>

<div class="bank-card">

<div class="card-number" id="cardNumber">
6037997194784360
</div>

<div class="owner">
به نام ماهان امیدی
</div>

</div>

<button class="btn copy-btn" onclick="copyCard()">
کپی شماره کارت
</button>

<button class="btn pay-btn" onclick="paid()">
پرداخت کردم
</button>

<a href="index.html" class="back-btn">
بازگشت به صفحه اصلی
</a>

<div class="message" id="message">

کاربر گرامی، در صورت تأیید پرداخت، پشتیبانی در اسرع وقت با شما تماس گرفته و آموزش مورد نظر را ارسال خواهد کرد.

<br><br>

روبیکا:
<b>@Omidi__xx</b>

<br>

شماره تماس:
<b>09379405557</b>

</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("courseName").innerText =
params.get("course") || "آموزش";

let price = params.get("price") || "0";

document.getElementById("coursePrice").innerText =
Number(price).toLocaleString("fa-IR") + " تومان";

function copyCard(){

navigator.clipboard.writeText("6037997194784360");

alert("شماره کارت کپی شد");

}

function paid(){

document.getElementById("message").style.display="block";

}

</script>

</body>
</html>
